name: 柿子选股爬虫

on:
  schedule:
    # UTC: 1:30(9:30) 2:30(10:30) 3:30(11:30) 5:30(13:30) 6:30(14:30) 7:30(15:30收盘) 北京时间
    - cron: '30 1,2,3,5,6,7 * * 1-5'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}

      - run: pip install requests

      - run: python crawler.py

      - name: 提交数据
        run: |
          git config user.name "Persimmon Bot"
          git config user.email "bot@persimmon.dev"
          git add data.json
          git diff --staged --quiet || (git commit -m "数据更新 $(TZ='Asia/Shanghai' date '+%m-%d %H:%M')" && git push)
